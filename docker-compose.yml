services:
  web:
    build: ./web
    image: status-web
    restart: unless-stopped
    env_file: .env
    environment:
      DIGEST_DIR: /data/ai-feed/digest
      GOACCESS_REPORT: /data/goaccess/index.html
      HEARTBEAT_DIR: /data/heartbeats
      PG_HOST: db
      PG_PORT: "5432"
    volumes:
      # Read-only views into the host paths the checks need to inspect.
      - /home/liharr/src/ai-feed/digest:/data/ai-feed/digest:ro
      - /home/liharr/src/ai-feed/fetch.log:/data/ai-feed/fetch.log:ro
      - /home/liharr/src/traffic-monitor/goaccess/report/index.html:/data/goaccess/index.html:ro
      - /home/liharr/.local/share/cron-heartbeats:/data/heartbeats:ro
      # Disk-usage probes need paths that resolve to the actual host filesystems,
      # since `/var/lib/docker` (and thus overlay2) now lives on the secondary disk.
      # /boot is on the root disk; /data is the secondary disk.
      - /boot:/host-root:ro
      - /data:/host-data:ro
    ports:
      - "127.0.0.1:3004:3000"

# Reuse the same docker network as traffic-monitor + vpn-monitor so the
# check runner can reach the shared Postgres container at hostname `db`.
networks:
  default:
    name: traffic-monitor_default
    external: true
